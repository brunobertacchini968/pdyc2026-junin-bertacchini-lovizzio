syntax = "proto3";

package ar.edu.unnoba.pdyc2026.grpc.usersocial;

option java_multiple_files = true;
option java_package = "ar.edu.unnoba.pdyc2026.grpc.usersocial";
option java_outer_classname = "UserSocialProto";

service UserSocialGrpcService {
  rpc GetFollowersByArtistId(ArtistFollowersRequest) returns (UserIdsResponse);
  rpc GetFavoritersByEventId(EventFavoritersRequest) returns (UserIdsResponse);
}

message ArtistFollowersRequest {
  int64 artistId = 1;
}

message EventFavoritersRequest {
  int64 eventId = 1;
}

message UserIdsResponse {
  repeated string usernames = 1;
}
