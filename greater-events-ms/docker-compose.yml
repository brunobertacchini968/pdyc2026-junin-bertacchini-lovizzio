version: '3.8'

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.9
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    ports:
      - "8084:8080"
    networks:
      - greater-events-net

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - greater-events-net

  postgres-catalog:
    image: postgres:16
    environment:
      POSTGRES_DB: greater_catalog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-catalog-data:/var/lib/postgresql/data
    networks:
      - greater-events-net

  postgres-users:
    image: postgres:16
    environment:
      POSTGRES_DB: greater_users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres-users-data:/var/lib/postgresql/data
    networks:
      - greater-events-net

  postgres-notifications:
    image: postgres:16
    environment:
      POSTGRES_DB: greater_notifications
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres-notifications-data:/var/lib/postgresql/data
    networks:
      - greater-events-net

networks:
  greater-events-net:
    driver: bridge

volumes:
  postgres-catalog-data:
  postgres-users-data:
  postgres-notifications-data:
