spring.application.name=events

# PostgreSQL datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/greater_events_pdyc2026
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Jackson: convertir camelCase (Java) <-> snake_case (JSON)
spring.jackson.property-naming-strategy=SNAKE_CASE

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/unnoba
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs

